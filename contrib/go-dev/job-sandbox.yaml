apiVersion: batch/v1
kind: Job
metadata:
  name: go-dev-sandbox
  namespace: default
  labels:
    app: nono-demo
    profile: go-dev
    mode: sandbox
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      annotations:
        nono.sh/profile: "go-dev"
    spec:
      runtimeClassName: nono-sandbox
      restartPolicy: Never
      containers:
        - name: demo
          image: nono-demo-go:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set +e
              echo "============================================"
              echo " Profile: go-dev | Mode: SANDBOX"
              echo " (runtimeClassName: nono-sandbox)"
              echo "============================================"
              echo ""
              touch /tmp/nono-demo-file 2>/dev/null || true
              chk() { printf '  %-50s' "$1"; shift; "$@" >/dev/null 2>&1 && echo "ALLOWED" || echo "BLOCKED"; }

              echo "--- dangerous_commands (expected: BLOCKED) ---"
              chk "rm -f /tmp/nono-demo-file"              rm -f /tmp/nono-demo-file
              chk "dd if=/dev/zero of=/tmp/dd-out"         dd if=/dev/zero of=/tmp/dd-out bs=1 count=1
              chk "chmod 777 /etc/hostname"                chmod 777 /etc/hostname
              chk "apt-get --version"                     apt-get --version
              echo ""
              echo "--- go-dev runtime (expected: ALLOWED) ---"
              chk "go version"                             go version
              chk "go env GOPATH"                          go env GOPATH
              chk "go env GOOS"                            go env GOOS
              echo ""
              echo "Done."
