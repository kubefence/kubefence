apiVersion: batch/v1
kind: Job
metadata:
  name: python-dev-baseline
  namespace: default
  labels:
    app: nono-demo
    profile: default
    mode: baseline
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: demo
          image: nono-demo-python:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set +e
              echo "============================================"
              echo " Mode: BASELINE (no runtimeClassName)"
              echo " No sandbox — full container access"
              echo "============================================"
              echo ""
              chk() { printf '  %-50s' "$1"; shift; "$@" >/dev/null 2>&1 && echo "ALLOWED" || echo "BLOCKED"; }

              echo "--- attack surface (expected: ALLOWED without sandbox) ---"
              chk "write /etc/hosts (host poisoning)"       bash -c 'echo "1.2.3.4 evil.com" >> /etc/hosts'
              chk "write /usr/local/bin/exploit (backdoor)" bash -c 'echo "#!/bin/sh" > /usr/local/bin/exploit'
              chk "read /etc/shadow (credential theft)"     cat /etc/shadow
              chk "read /etc/passwd (user enumeration)"     cat /etc/passwd
              chk "write site-packages/evil.py (pkg inject)" bash -c 'echo "import os" > /usr/local/lib/python3.12/site-packages/evil.py'
              echo ""
              echo "--- python-dev runtime (expected: ALLOWED) ---"
              chk "python3 --version"                       python3 --version
              chk "python3 -c print"                        python3 -c 'print("hello from baseline")'
              chk "write /tmp/workfile"                     bash -c 'echo "workspace" > /tmp/workfile'
              echo ""
              echo "Done."
