apiVersion: v1
kind: Pod
metadata:
  name: python-dev-baseline
  namespace: default
  labels:
    app: nono-demo
    mode: baseline
spec:
  restartPolicy: Never
  containers:
    - name: demo
      image: nono-demo-python:latest
      imagePullPolicy: IfNotPresent
      command: ["sleep", "infinity"]

# ─────────────────────────────────────────────────────────────────────────────
# INTERACTIVE USAGE — no sandbox active
# ─────────────────────────────────────────────────────────────────────────────
#
# No runtimeClassName → no NRI injection → /nono is not mounted.
# The bash wrapper detects the absence of /nono/nono and falls back to
# plain bash — so exec works normally with no sandboxing:
#
#   kubectl exec -it python-dev-baseline -- bash   ← no sandbox
#
# THINGS TO TRY (all allowed):
#   echo "1.2.3.4 evil" >> /etc/hosts
#   echo "#!/bin/sh" > /usr/local/bin/exploit
#   cat /etc/shadow
#   cat /etc/passwd
#   python3 --version
#   echo "ok" > /tmp/workfile
# ─────────────────────────────────────────────────────────────────────────────
