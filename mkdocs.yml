site_name: kubefence
site_description: "Kubernetes NRI plugin for transparent Landlock sandboxing with nono"
repo_url: https://github.com/kubefence/kubefence
repo_name: kubefence/kubefence

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Caveats: caveats.md
  - Troubleshooting: troubleshooting.md
