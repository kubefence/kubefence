name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      nono_version:
        description: "nono binary version to embed (e.g. v0.20.0). Defaults to NONO_VERSION below."
        required: false
        default: ""

# Default nono release to embed. Update this value when a new nono is released,
# then re-run the workflow (or create a new nono-nri release) to publish a fresh image.
env:
  NONO_VERSION: v0.20.0
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve nono version
        id: nono
        run: |
          VERSION="${{ inputs.nono_version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ env.NONO_VERSION }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using nono version: $VERSION"

      - name: Download and extract nono binary
        run: |
          VERSION="${{ steps.nono.outputs.version }}"
          URL="https://github.com/always-further/nono/releases/download/${VERSION}/nono-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o /tmp/nono.tar.gz
          mkdir -p /tmp/nono-extract
          tar xzf /tmp/nono.tar.gz -C /tmp/nono-extract
          # Handle both flat and subdirectory tarball layouts
          find /tmp/nono-extract -maxdepth 2 -name nono -type f | head -1 | xargs -I{} cp {} ./nono
          chmod +x ./nono
          file ./nono

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On release: tag with semver (v1.2.3 → 1.2.3 and 1.2) + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            # On manual dispatch: tag with nono version for traceability
            type=raw,value=nono-${{ steps.nono.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
