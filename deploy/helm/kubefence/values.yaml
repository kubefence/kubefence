# Namespace for all resources
namespace: kube-system

# Container image — published by .github/workflows/release.yaml.
# For dev (Kind) deploy.sh overrides repository/tag via --set to point at
# the locally-built image loaded into the cluster.
image:
  repository: ghcr.io/kubefence/nono-nri-plugin
  tag: latest
  pullPolicy: IfNotPresent

# Optional ServiceAccount
serviceAccount:
  create: false

# NRI plugin TOML configuration
# These values are rendered into /etc/nri/conf.d/10-nono-nri.toml
config:
  runtimeClasses:
    - nono-runc
  defaultProfile: "default"
  nonoBinPath: "/opt/nono-nri/nono"
  socketPath: ""
  vmRootfsClasses: []

# Host paths for volume mounts
hostPaths:
  nriSocket: /var/run/nri
  nonoHostDir: /opt/nono-nri
  nriPlugins: /opt/nri/plugins

# RuntimeClass creation
runtimeClasses:
  nonoRunc:
    enabled: true
  kataNono:
    enabled: false
    handler: "kata-qemu"

# DaemonSet tolerations
tolerations:
  - operator: Exists

# Resource requests/limits for the nono-nri plugin container.
# Limits prevent a burst of container-creation events from exhausting
# node memory and triggering an OOM kill, which would leave a window
# where new containers start without nono injection.
resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Helper images used by privileged init containers in nodeSetup and kata DaemonSets.
# Pin to immutable digests in production to prevent registry compromise from
# delivering malicious code into privileged host-patching containers.
# Example: alpine:3.20@sha256:<digest>
helperImages:
  alpine: alpine:3.20
  busybox: busybox:1.37.0-uclibc

# Host path to containerd's configuration file.
# Shared by the nodeSetup and kata DaemonSets for config patching.
containerdConfigPath: /etc/containerd/config.toml

# Node-level containerd configuration.
# When enabled, a privileged DaemonSet (daemonset-node-setup) patches
# containerd on each node to:
#   - Enable the NRI subsystem (required for the nono-nri plugin to connect)
#   - Register the nono-runc runtime handler (required for the nono-runc RuntimeClass)
# Disable only if your cluster provisioner already handles both.
nodeSetup:
  enabled: true
  nri:
    socketPath: /var/run/nri/nri.sock
    pluginPath: /opt/nri/plugins
    configPath: /etc/nri/conf.d

# Kata Containers node provisioning.
# When enabled, a privileged DaemonSet (daemonset-kata-setup) installs the
# Landlock-enabled kata kernel and nono-embedded rootfs onto each cluster node
# and configures the kata-nono-qemu containerd runtime handler.
#
# Prerequisites:
#   - kata-deploy must be installed and its DaemonSet must be fully rolled out
#     before nono-nri is installed (the setup DaemonSet waits for the kata QEMU
#     config file to appear before proceeding).
#
# Images are published by the GHA workflows on every nono-nri release:
#   kata.kernelImage: ghcr.io/kubefence/kata-kernel-landlock:<kata-version>
#   kata.rootfsImage: ghcr.io/kubefence/kata-rootfs-nono:<kata-version>-<nono-version>
kata:
  enabled: false

  # OCI image carrying /vmlinux — built by .github/workflows/kata-kernel.yaml.
  # Pin to an immutable digest in production: ghcr.io/kubefence/kata-kernel-landlock:3.28.0@sha256:<digest>
  kernelImage: ghcr.io/kubefence/kata-kernel-landlock:3.28.0

  # OCI image carrying /kata-containers-confidential.image — built by kata-rootfs.yaml.
  # Pin to an immutable digest in production: ghcr.io/kubefence/kata-rootfs-nono:3.28.0-v0.23.0@sha256:<digest>
  rootfsImage: ghcr.io/kubefence/kata-rootfs-nono:3.28.0-v0.23.0

  # Directory where kata-deploy installs kata share files on each node.
  shareDir: /opt/kata/share/kata-containers

  # Path to the kata QEMU configuration file written by kata-deploy.
  qemuConfigPath: /opt/kata/share/defaults/kata-containers/runtimes/qemu/configuration-qemu.toml

  qemu:
    # Additional machine accelerators for the QEMU hypervisor.
    # Leave empty for bare-metal nodes.
    # Set to "kernel_irqchip=split" for nested-KVM environments (e.g. Kind).
    machineAccelerators: ""
