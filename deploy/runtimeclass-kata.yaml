# Kata Containers + nono sandboxing.
# Uses the kata-qemu handler (installed by kata-deploy) so pods run inside a
# QEMU/KVM micro-VM.  nono-nri injects the nono binary via a virtiofs-backed
# bind mount — the host path /opt/nono-nri/nono is shared into the guest by
# kata-runtime and mounted at /nono/nono inside the container.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-nono-sandbox
handler: kata-qemu
