apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nono-nri
  namespace: kube-system
  labels:
    app: nono-nri
spec:
  selector:
    matchLabels:
      app: nono-nri
  template:
    metadata:
      labels:
        app: nono-nri
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: install-nono
          image: nono-nri:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              chmod 0700 /opt/nono-nri
              cp /usr/local/bin/nono /opt/nono-nri/nono
              chmod 0755 /opt/nono-nri/nono
              # Generate wrapper scripts for common interpreters.
              # These land at /nono/{sh,bash,...} inside containers (via the
              # bind-mount of /opt/nono-nri → /nono) and are found first when
              # the NRI plugin prepends /nono to the container's PATH.
              # Each wrapper calls nono wrap so kubectl exec is sandboxed too.
              for pair in \
                "sh:/bin/sh" \
                "bash:/bin/bash" \
                "ash:/bin/ash" \
                "dash:/bin/dash" \
                "python3:/usr/bin/python3" \
                "python:/usr/bin/python" \
                "node:/usr/bin/node" \
                "ruby:/usr/bin/ruby" \
                "perl:/usr/bin/perl"; do
                name="${pair%%:*}"
                real="${pair##*:}"
                printf '#!/bin/sh\nexec /nono/nono wrap --profile "${NONO_PROFILE:-default}" -- %s "$@"\n' \
                  "$real" > "/opt/nono-nri/$name"
                chmod 0755 "/opt/nono-nri/$name"
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nono-host-dir
              mountPath: /opt/nono-nri
      containers:
        - name: nono-nri
          image: nono-nri:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/10-nono-nri
            - --config
            - /etc/nri/conf.d/10-nono-nri.toml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nri-socket
              mountPath: /var/run/nri
              readOnly: true
            - name: nono-host-dir
              mountPath: /opt/nono-nri
              readOnly: true
            - name: nri-config
              mountPath: /etc/nri/conf.d
              readOnly: true
            - name: nono-state
              mountPath: /var/run/nono-nri
      tolerations:
        - operator: Exists
      volumes:
        - name: nri-socket
          hostPath:
            path: /var/run/nri
            type: DirectoryOrCreate
        - name: nono-host-dir
          hostPath:
            path: /opt/nono-nri
            type: DirectoryOrCreate
        - name: nri-config
          hostPath:
            path: /etc/nri/conf.d
            type: DirectoryOrCreate
        - name: nono-state
          hostPath:
            path: /var/run/nono-nri
            type: DirectoryOrCreate
