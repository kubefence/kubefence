kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.32.2@sha256:f226345927d7e348497136874b6d207e0b32cc52154ad8323129352923a3142f
    extraMounts:
    - hostPath: /opt/nono-nri
      containerPath: /opt/nono-nri
      propagation: Bidirectional
    - hostPath: /etc/nri/conf.d
      containerPath: /etc/nri/conf.d
    - hostPath: /opt/nri/plugins
      containerPath: /opt/nri/plugins
    - hostPath: /var/run/nri
      containerPath: /var/run/nri
      propagation: Bidirectional
containerdConfigPatches:
  - |-
    [plugins."io.containerd.nri.v1.nri"]
      disable = false
      plugin_path = "/opt/nri/plugins"
      plugin_config_path = "/etc/nri/conf.d"
      socket_path = "/var/run/nri/nri.sock"
      plugin_registration_timeout = "5s"
      plugin_request_timeout = "2s"
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.nono-runc]
      runtime_type = "io.containerd.runc.v2"
