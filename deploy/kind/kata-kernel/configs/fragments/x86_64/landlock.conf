# Landlock LSM
#
# Enables the Landlock access-control LSM so that nono can apply
# filesystem sandboxing rules inside the kata guest VM.
#
# CONFIG_LSM must also include "landlock" for the LSM to be initialised
# at boot.  Because CONFIG_LSM is a string and merge_config.sh uses
# last-value-wins semantics, prepending "landlock" to the existing list
# is handled as a post-merge step in the Dockerfile rather than here,
# to avoid overriding kata's LSM list with an incomplete hardcoded value.

CONFIG_SECURITY_LANDLOCK=y
