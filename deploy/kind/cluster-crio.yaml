kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: quay.io/confidential-containers/kind-crio:v1.35.2
# Tell kubeadm to use the CRI-O socket instead of the default containerd socket.
# Required because kind v0.20 does not auto-detect CRI-O.
kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      criSocket: unix:///var/run/crio/crio.sock
  - |
    kind: JoinConfiguration
    nodeRegistration:
      criSocket: unix:///var/run/crio/crio.sock
# Note: CRI-O 1.35 ships with NRI enabled by default. No containerdConfigPatches needed.
